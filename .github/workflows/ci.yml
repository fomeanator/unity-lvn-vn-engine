name: CI

on:
  push:
    branches: [main]
  pull_request:

# Each Go module is built and tested standalone (GOWORK=off), the way a
# consumer would `go install` it — the repo's go.work is a local convenience,
# not part of the contract.
env:
  GOWORK: "off"

jobs:
  go:
    name: Go (${{ matrix.module }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: [tools/lvnconv, server]
    defaults:
      run:
        working-directory: ${{ matrix.module }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"
          cache: false   # no external deps, nothing to cache
      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files need gofmt:"; echo "$unformatted"; exit 1
          fi
      - name: vet
        run: go vet ./...
      - name: build
        run: go build ./...
      - name: test
        run: go test ./...

  smoke:
    name: lvnconv end-to-end
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"
          cache: false
      - name: convert + validate the example
        working-directory: tools/lvnconv
        run: |
          go run . convert -i ../../examples/hello.ink -o /tmp/hello.lvn
          go run . validate /tmp/hello.lvn
          go run . probe /tmp/hello.lvn
